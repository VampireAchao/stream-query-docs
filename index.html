<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>stream-query</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <meta name="description" content="Description">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="stylesheet" href="./static/css/docsify.css">
    <style>
        :root {
            --docsifytabs-border-color: #ededed;
            --docsifytabs-tab-highlight-color: #42b983;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
	window.$docsify = {
		name: 'stream-query',
		repo: 'https://github.com/VampireAchao/stream-query.git',
		loadSidebar: true,
		loadNavbar: true,
		alias: {
			'/.*/_sidebar.md': '/_sidebar.md',
			'/.*/_navbar.md': '/_navbar.md',
		},
		coverpage: true,
		search: 'auto',
		subMaxLevel: 3,
		tabs: {
			persist: true,      // default
			sync: true,      // default
			theme: 'classic', // default
			tabComments: true,      // default
			tabHeadings: true,       // default
		},
	};
	// https://s01.oss.sonatype.org/content/repositories/releases/io/github/vampireachao/stream-query/maven-metadata.xml

</script>
<!-- Docsify v4 -->
<script src="./static/js/docsify.js"></script>
<script src="./static/js/search.min.js"></script>
<script src="./static/js/emoji.min.js"></script>
<script src="./static/js/external-script.min.js"></script>
<script src="./static/js/zoom-image.min.js"></script>
<script src="./static/js/docsify-copy-code.min.js"></script>
<script src="./static/js/docsify-pagination.min.js"></script>
<script src="./static/js/docsify-tabs@1.js"></script>
<script src="./static/js/docsify-katex.js"></script>
</body>
</html>
